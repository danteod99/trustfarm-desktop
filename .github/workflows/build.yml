name: Build TrustFarm

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: TrustFarm-Setup-windows.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: TrustFarm-macos-arm64.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ""
          TAURI_KEY_PASSWORD: ""
        with:
          tagName: v__VERSION__
          releaseName: 'TrustFarm Desktop v__VERSION__'
          releaseBody: 'TrustFarm Desktop - Phone Farm Manager'
          releaseDraft: false
          prerelease: false
