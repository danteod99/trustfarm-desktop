name: Build Android APK (Test APK + APK) with Whitelabel
run-name: ${{ github.actor }} is building Android APK from tikfarm-android 🚀
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g., v1.0.0)"
        required: true
        type: string
      branch:
        description: "Branch to build from in tikfarm-android"
        required: false
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tikfarm-desktop repository (for whitelabel configs)
        uses: actions/checkout@v3
        with:
          path: tikfarm-desktop

      - name: Checkout tikfarm-pro repository
        uses: actions/checkout@v3
        with:
          repository: tikfarm/tikfarm-pro
          token: ${{ secrets.REPO_TOKEN }}
          ref: ${{ inputs.branch }}
          path: tikfarm-pro

      - name: Setup Node.js (for whitelabel scripts)
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Make gradlew executable
        run: |
          chmod +x ./gradlew || true
        working-directory: tikfarm-pro/android

      - name: Build Official TikFarm APKs
        run: |
          ./gradlew build
          ./gradlew packageDebugAndroidTest
          mkdir -p app/build/apk
          mv app/build/outputs/apk/debug/app-debug.apk app/build/apk/com.github.tikfarm.apk || true
          mv app/build/outputs/apk/androidTest/debug/app-debug-androidTest.apk app/build/apk/com.github.tikfarm.test.apk || true
        working-directory: tikfarm-pro/android

      - name: Upload APK to R2
        uses: ryand56/r2-upload-action@v1.4
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID_NIO }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID_NIO }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY_NIO }}
          r2-bucket: matrix
          source-dir: tikfarm-pro/android/app/build/apk/
          destination-dir: ./

      - name: Update Library Version
        shell: bash
        env:
          API_KEY: ${{ secrets.API_KEY }}
          VERSION: ${{ inputs.version }}
        run: |
          set -e

          # Update APK
          APK_PAYLOAD=$(cat <<EOF
          {
            "name": "apk",
            "platform": "generic",
            "downloadUrl": "https://api.tikfarm.com/front-api/release/com.github.tikfarm.apk",
            "version": "${VERSION}",
            "app": "TikFarm"
          }
          EOF
          )

          echo "Updating apk library..."

          curl -X POST "https://api.tikfarm.com/ci/update_lib" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${API_KEY}" \
            -d "${APK_PAYLOAD}"
          echo "Updated apk library on api.tikfarm.com"

          # Update test-apk
          TEST_PAYLOAD=$(cat <<EOF
          {
            "name": "test-apk",
            "downloadUrl": "https://api.tikfarm.com/front-api/release/com.github.tikfarm.test.apk",
            "platform": "generic",
            "version": "${VERSION}",
            "app": "TikFarm"
          }
          EOF
          )

          echo "Updating test-apk library..."

          curl -X POST "https://api.tikfarm.com/ci/update_lib" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${API_KEY}" \
            -d "${TEST_PAYLOAD}"

          echo "Updated test-apk library on api.tikfarm.com"
